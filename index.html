<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Boxing Quiz - Test your boxing knowledge across three difficulty levels. From Rookie to Champion, how well do you know the sport?">
    <title>Boxing Quiz</title>

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">

    <!-- Google Fonts -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- Navigation -->
    <nav id="navbar" class="navbar navbar-expand-lg" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🥊 Boxing Quiz</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#home-section">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#difficulty-section">Play</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Landing / Home Section -->
    <section id="home-section" class="container section text-center">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8">
                <h1 class="display-3">Boxing Quiz</h1>
                <p class="lead">Think you know your boxing? From legendary fighters to iconic bouts, put your knowledge to the test!</p>
                <button id="start-btn" class="btn custom-button mt-3">Let's Go 🥊</button>
            </div>
        </div>
    </section>

    <!-- Difficulty Selection Section (hidden by default) -->
    <section id="difficulty-section" class="container section text-center d-none">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8">
                <h2>Choose Your Level</h2>
                <p>How well do you know your boxing?</p>
                <div class="row justify-content-center mt-4">
                    <div class="col-12 col-md-4 mb-3">
                        <button class="btn difficulty-btn w-100" data-difficulty="rookie">🟢 Rookie</button>
                    </div>
                    <div class="col-12 col-md-4 mb-3">
                        <button class="btn difficulty-btn w-100" data-difficulty="contender">🟡 Contender</button>
                    </div>
                    <div class="col-12 col-md-4 mb-3">
                        <button class="btn difficulty-btn w-100" data-difficulty="champion">🔴 Champion</button>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
    </script>

    <!-- Custom JavaScript -->
    <script src="assets/js/script.js"></script>
</body>

</html>
